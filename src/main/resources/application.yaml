server:
  port: 8201

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/product_ms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: product-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/   # Point to Eureka Server
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ✅ Expose api-docs so gateway can fetch them
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs              # Gateway calls /product-service/v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html          # Direct access: http://localhost:8201/swagger-ui.html
